services:
  db:
    image: postgres:15
    container_name: invoice_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: invoice_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    container_name: invoice_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: invoice_db
      DB_PORT: 5432
      DB_SSLMODE: disable
      JWT_SECRET: secret
    ports:
      - "8080:8080"

  web:
    build: ./apps/web
    container_name: invoice_web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://api:8080
    ports:
      - "3000:3000"

volumes:
  db_data:
